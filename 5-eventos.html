<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentos</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function Alert1() {
        function handleAlertClick(event) {
          console.log(event);
          alert("Uma mensagem de alerta!");
        }

        return (
          <button type="button" onClick={handleAlertClick}>
            Mostrar botão 1
          </button>
        );
      }

      function Alert2() {
        function handleAlertClick(msg) {
          alert(msg);
        }

        return (
          <button
            type="button"
            onClick={() => handleAlertClick("Uma mensagem de alerta!")}
          >
            Mostrar botão 2
          </button>
        );
      }

      function Alert3() {
        function handleAlertClick(event) {
          alert(event.target.previousSibling.value);
        }

        return (
          <div>
            <input type="text" placeholder="digite algo..." />

            <button type="button" onClick={handleAlertClick}>
              mostrar alerta do campo de texto
            </button>
          </div>
        );
      }

      function App() {
        return (
          <main
            style={{
              padding: "20px",
              display: "flex",
              flexDirection: "column",
              gap: "10px",
            }}
          >
            <Alert1 />
            <Alert2 />
            {/* Adicionado o Alert3 aqui para que consiga ver e testar na tela */}
            <Alert3 />
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
