<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentos</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function Contador() {
        const [counter, setCounter] = React.useState(0);
        const [name, setName] = React.useState("");

        React.useEffect(() => {
          console.log("components montado!");

          return () => {
            console.log("components desmontado!");
          };
        }, []);

        React.useEffect(() => {
          if (counter > 0) {
            console.log(`COntainer atualizado! ${counter}`);
          }
        }, [counter]);

        React.useEffect(() => {
          console.log("Contador ou me atualizados");
        }, [counter, name]);

        return (
          <>
            <div>
              <label>Nome:</label>
              <input onChange={(e) => setName(e.target.value)} type="text" />
            </div>

            <h1>Contador:{counter}</h1>
            <button
              className=""
              onClick={() => setCounter((preValue) => preValue + 1)}
            >
              Incrementar
            </button>

            <button
              className=""
              onClick={() => setCounter((preValue) => preValue - 1)}
            >
              Decrementarcrementar
            </button>
          </>
        );
      }

      function App() {
        const [show, setShow] = React.useState(true);

        return (
          <main className="p-3">
            <button onClick={() => setShow(!show)}>Mostrar/ocultar</button>
            {
              show && <Contador />
            }
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
