<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>React + Tailwind v4</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Rubik&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>

    <style type="text/tailwindcss">
      @theme {
        --text: #ebebeb;
        --text-secondary: #6b6b6b;
        --primary: #462878;
        --background: #2d2a37;

        /* No v4, gradientes precisam começar com --background-image- */
        --background-image-btn-grad: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.05) 0%,
          rgba(255, 255, 255, 0.05) 100%
        );

        --background-image-btn-grad-hover: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.1) 0%,
          rgba(255, 255, 255, 0.05) 100%
        );

        /* Para usar sombras customizadas no v4 com utilitários shadow-* */
        --shadow-btn:
          0px 11px 7px 0px rgba(0, 0, 0, 0.01),
          0px 7px 7px 0px rgba(0, 0, 0, 0.04),
          0px 4px 6px 0px rgba(0, 0, 0, 0.1),
          0px 2px 4px 0px rgba(0, 0, 0, 0.26),
          0px 0px 2px 0px rgba(0, 0, 0, 0.29),
          0px 2px 3px 0px rgba(255, 255, 255, 0.06) inset;

        --font-sans: "Rubik", sans-serif;
      }
    </style>
  </head>

  <body
    class="min-h-screen bg-[var(--primary)] text-[var(--text)] font-(var(--font-sans))"
  >
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-custom-classes>
      const textVariants = {
        default: "text-xl",
        muted: "text-xl text-[var(--text-secondary)]",
        heading: "text-2xl",
        blast: "text-3xl",
      };

      function Text({
        as = "span",
        variant = "default",
        className = "",
        children,
        ...props
      }) {
        return React.createElement(as, {
          className: `${textVariants[variant]} ${className ? className : ""}`,
          ...props,
          children,
        });
      }

      const buttonVariants = {
        default: "bg-[#2d2a37]",
        primary: "bg-[#462878]",
      };

      function Button({ variant = "default", className, children, ...props }) {
        return (
          <Text
            as="button"
            variant="heading"
            className={`
              flex items-center justify-center
              rounded-xl
              p-3
              w-16 h-16
              cursor-pointer
              text-[var(--text)]
              bg-btn-grad
              hover:bg-btn-grad-hover
              shadow-btn
              border border-white/5
              transition-colors
              ${buttonVariants[variant]}
              ${className || ""}
            `}
            {...props}
          >
            {children}
          </Text>
        );
      }

      function Card({ children, className = "", ...props }) {
        return (
          <div
            className={`bg-[#2a2634] shadow-btn rounded-2xl border border-white/5 ${className}`}
            {...props}
          >
            {children}
          </div>
        );
      }

      const buttons = [
        [
          { input: "CE" },
          { input: "C", className: "flex-1 h-16" },
          { input: "/", variant: "primary" },
        ],

        [
          { input: "7" },
          { input: "8" },
          { input: "9" },
          { input: "*", variant: "primary" },
        ],

        [
          { input: "4" },
          { input: "5" },
          { input: "6" },
          { input: "-", variant: "primary" },
        ],

        [
          { input: "1" },
          { input: "2" },
          { input: "3" },
          { input: "+", variant: "primary" },
        ],

        [
          { input: "0", className: "flex-1 h-16" },
          { input: "," },
          { input: "=", variant: "primary" },
        ],
      ];
      /* CORREÇÃO: Removidos os caracteres inválidos e as chaves soltas do return */
      function CalculatorDisplay({ operation, result }) {
        return (
          <div className="flex flex-col gap-1 px-[1.375rem] cursor-default select-none text-right">
            <Text as="div" variant="muted" className="justify-end w-full">
              {operation}
            </Text>

            <div className="flex items-center justify-between w-full">
              <Text variant="muted" className="opacity-50">
                =
              </Text>
              <Text variant="blast" className="font-bold text-white">
                {result}
              </Text>
            </div>
          </div>
        );
      }

      function Calculator() {
        return (
          <Card className="flex flex-col gap-[1.625rem] w-[22.25rem] pt-14 px-8 pb-8">
            <CalculatorDisplay operation="1 + 1" result="2" />

            <div className="flex flex-col gap-3">
              {buttons.map((row, index) => {
                return (
                  <div key={`row-${index}`} className="flex gap-3">
                    {row.map((button) => (
                      <Button
                        key={button.input}
                        variant={button.variant}
                        className={button.className || "w-16 h-16"}
                      >
                        {button.input}
                      </Button>
                    ))}
                  </div>
                );
              })}
            </div>
          </Card>
        );
      }

      function OperationHistory() {
        return (
          <Card className="w-full py-10 px-8">
            <Text as="h1" variant="heading" className="mb-4">
              Histórico de Operações
            </Text>
            <ul className="flex flex-col gap-3">
              <Text as="li">1 / 1 = 1</Text>
              <Text as="li">1 + 1 = 2</Text>
              <Text as="li">1 * 1 = 1</Text>
              <Text as="li">1 - 1 = 0</Text>
            </ul>
          </Card>
        );
      }

      function App() {
        return (
          <main className="py-28 px-4 sm:px-10 flex flex-col sm:flex-row items-center sm:items-stretch gap-2">
            <Calculator />
            <OperationHistory />
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
